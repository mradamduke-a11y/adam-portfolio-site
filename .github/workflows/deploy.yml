name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on cPanel
        run: |
          curl -s -X POST \
            "https://adamdukeugc.com:2083/execute/VersionControl/update" \
            -u "dukesbread:${{ secrets.CPANEL_PASSWORD }}" \
            --data "repository_root=/home2/dukesbread/adam-portfolio-repo" \
            -k

      - name: Deploy to public_html
        run: |
          curl -s -X POST \
            "https://adamdukeugc.com:2083/execute/VersionControlDeployment/create" \
            -u "dukesbread:${{ secrets.CPANEL_PASSWORD }}" \
            --data "repository_root=/home2/dukesbread/adam-portfolio-repo" \
            -k
